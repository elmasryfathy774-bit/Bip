<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وصلة | محادثة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070B14;
    --surface:#0E1526;
    --surface-2:#131B2F;
    --bubble-mine:#1A4FD1;
    --bubble-theirs:#131B2F;
    --border-soft: rgba(255,255,255,.08);
    --cyan:#2FE0FF;
    --cyan-deep:#1A4FD1;
    --text:#EAF2FA;
    --muted:#7C8AA3;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{ height:100%; }
  body{
    font-family:'Cairo', sans-serif;
    color:var(--text);
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(circle at 18% 12%, rgba(47,224,255,.10), transparent 38%),
      radial-gradient(circle at 88% 85%, rgba(26,79,209,.14), transparent 42%),
      var(--void);
    overflow:hidden;
  }

  .topbar{
    background:rgba(14,21,38,.9);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border-soft);
    padding:14px 20px;
    display:flex;
    align-items:center;
    gap:12px;
    flex-shrink:0;
  }
  .back-btn{
    width:34px; height:34px;
    border-radius:9px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--border-soft);
    color:var(--text);
    display:flex; align-items:center; justify-content:center;
    text-decoration:none;
    font-size:16px;
    flex-shrink:0;
  }
  .back-btn:hover{ border-color:var(--cyan); color:var(--cyan); }
  .avatar{
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    color:#06121C;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:15px;
    flex-shrink:0;
    overflow:hidden;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .peer-info{ flex:1; min-width:0; }
  .peer-name{ font-weight:700; font-size:15.5px; }
  .peer-status{ font-size:12px; color:var(--muted); }

  /* ===== Messages area ===== */
  .messages{
    flex:1;
    overflow-y:auto;
    padding:18px 16px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .messages::-webkit-scrollbar{ width:6px; }
  .messages::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.12); border-radius:10px; }

  .msg-row{
    display:flex;
    margin:3px 0;
    max-width:78%;
  }
  .msg-row.mine{ align-self:flex-end; flex-direction:row-reverse; }
  .msg-row.theirs{ align-self:flex-start; }

  .bubble{
    padding:10px 14px;
    border-radius:16px;
    font-size:14.5px;
    line-height:1.65;
    word-wrap:break-word;
    white-space:pre-wrap;
    position:relative;
  }
  .msg-row.mine .bubble{
    background:linear-gradient(135deg, var(--cyan-deep), #1640A8);
    color:#fff;
    border-bottom-left-radius:5px;
  }
  .msg-row.theirs .bubble{
    background:var(--surface);
    border:1px solid var(--border-soft);
    color:var(--text);
    border-bottom-right-radius:5px;
  }
  .msg-time{
    display:block;
    font-size:10.5px;
    margin-top:4px;
    opacity:.6;
    text-align:left;
  }
  .msg-row.theirs .msg-time{ text-align:right; }

  .empty-chat{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:var(--muted);
    font-size:14px;
    padding:32px;
  }
  .empty-chat .icon{ font-size:34px; display:block; margin-bottom:10px; }

  /* ===== Composer ===== */
  .composer{
    flex-shrink:0;
    border-top:1px solid var(--border-soft);
    background:rgba(14,21,38,.92);
    backdrop-filter:blur(8px);
    padding:12px 14px;
    display:flex;
    align-items:flex-end;
    gap:10px;
  }
  .composer textarea{
    flex:1;
    resize:none;
    max-height:120px;
    min-height:44px;
    padding:11px 16px;
    border:1.5px solid var(--border-soft);
    border-radius:20px;
    font-family:inherit;
    font-size:14.5px;
    color:var(--text);
    background:var(--surface-2);
    outline:none;
    line-height:1.5;
    transition:border-color .15s, box-shadow .15s;
  }
  .composer textarea::placeholder{ color:#52607A; }
  .composer textarea:focus{
    border-color:var(--cyan);
    box-shadow:0 0 0 4px rgba(47,224,255,.18);
  }
  .send-btn{
    width:44px; height:44px;
    border-radius:50%;
    border:none;
    flex-shrink:0;
    background:linear-gradient(135deg,var(--cyan), var(--cyan-deep));
    color:#06121C;
    font-size:17px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:filter .15s, transform .1s, opacity .15s;
    box-shadow:0 8px 20px -8px rgba(47,224,255,.55);
  }
  .send-btn:hover{ filter:brightness(1.08); }
  .send-btn:active{ transform:scale(.94); }
  .send-btn:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <a href="chat.html" class="back-btn">→</a>
    <div class="avatar" id="avatar">؟</div>
    <div class="peer-info">
      <div class="peer-name" id="peerName">...</div>
      <div class="peer-status">محادثة خاصة</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-chat" id="emptyChat">
      <span><span class="icon">💬</span>جاري تحميل المحادثة...</span>
    </div>
  </div>

  <form class="composer" id="composerForm">
    <textarea id="msgInput" placeholder="اكتبي رسالتك..." rows="1"></textarea>
    <button type="submit" class="send-btn" id="sendBtn">➤</button>
  </form>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    collection, addDoc, query, orderBy, onSnapshot, serverTimestamp,
    doc, setDoc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const chatId = params.get('chatId');
  const peerUid = params.get('uid');
  const peerName = params.get('name') || 'المستخدم';

  document.getElementById('peerName').textContent = peerName;
  const avatarEl = document.getElementById('avatar');
  avatarEl.textContent = peerName.charAt(0).toUpperCase();

  // جلب صورة بروفايل الشخص التاني لو موجودة
  getDoc(doc(db, 'users', peerUid)).then(snap => {
    if(snap.exists() && snap.data().photoURL){
      avatarEl.innerHTML = `<img src="${snap.data().photoURL}" alt="${peerName}">`;
    }
  }).catch(() => {});

  const messagesEl = document.getElementById('messages');
  const emptyChat = document.getElementById('emptyChat');
  const composerForm = document.getElementById('composerForm');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  let currentUser = null;

  // لو مفيش chatId أو uid في الرابط، رجّعيها لقائمة المستخدمين
  if(!chatId || !peerUid){
    window.location.href = 'chat.html';
  }

  // حماية الصفحة
  onAuthStateChanged(auth, (user) => {
    if(!user){
      window.location.href = 'index.html';
      return;
    }
    currentUser = user;
    listenToMessages();
  });

  // ====================================================
  // الاستماع للرسائل لحظيًا (real-time) مرتبة حسب الوقت
  // ====================================================
  function listenToMessages(){
    const messagesRef = collection(db, 'chats', chatId, 'messages');
    const q = query(messagesRef, orderBy('createdAt', 'asc'));

    onSnapshot(q, (snapshot) => {
      if(snapshot.empty){
        messagesEl.innerHTML = '';
        messagesEl.appendChild(emptyChat);
        emptyChat.innerHTML = `<span><span class="icon">👋</span>ابدئي أول رسالة مع ${escapeHtml(peerName)}</span>`;
        return;
      }
      renderMessages(snapshot.docs.map(d => d.data()));
    }, (error) => {
      messagesEl.innerHTML = `<div class="empty-chat"><span>حصل خطأ في تحميل الرسائل: ${escapeHtml(error.message)}</span></div>`;
    });
  }

  function renderMessages(msgs){
    const wasNearBottom = isNearBottom();

    messagesEl.innerHTML = msgs.map(m => {
      const mine = m.senderId === currentUser.uid;
      const time = formatTime(m.createdAt);
      return `
        <div class="msg-row ${mine ? 'mine' : 'theirs'}">
          <div class="bubble">
            ${escapeHtml(m.text)}
            <span class="msg-time">${time}</span>
          </div>
        </div>
      `;
    }).join('');

    if(wasNearBottom) scrollToBottom();
  }

  function isNearBottom(){
    return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 150;
  }
  function scrollToBottom(){
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function formatTime(ts){
    if(!ts || !ts.toDate) return '';
    const d = ts.toDate();
    return d.toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  // ====================================================
  // إرسال رسالة جديدة
  // ====================================================
  async function sendMessage(){
    const text = msgInput.value.trim();
    if(!text || !currentUser) return;

    msgInput.value = '';
    autoGrow();
    sendBtn.disabled = true;

    try{
      // تأكيد وجود مستند الشات نفسه (يفيد لاحقًا في عرض قوائم المحادثات وآخر رسالة)
      await setDoc(doc(db, 'chats', chatId), {
        members: [currentUser.uid, peerUid],
        updatedAt: serverTimestamp(),
        lastMessage: text
      }, { merge: true });

      await addDoc(collection(db, 'chats', chatId, 'messages'), {
        text: text,
        senderId: currentUser.uid,
        createdAt: serverTimestamp()
      });
    } catch(error){
      alert('حصل خطأ أثناء إرسال الرسالة: ' + error.message);
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }

  composerForm.addEventListener('submit', (e) => {
    e.preventDefault();
    sendMessage();
  });

  // إرسال بـ Enter، وسطر جديد بـ Shift+Enter
  msgInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  // توسعة الـ textarea تلقائيًا مع الكتابة
  function autoGrow(){
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  }
  msgInput.addEventListener('input', autoGrow);
</script>

</body>
</html>
