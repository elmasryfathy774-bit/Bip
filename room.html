<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatChat | محادثة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070B14;
    --surface:#0E1526;
    --surface-2:#131B2F;
    --bubble-mine:#1A4FD1;
    --bubble-theirs:#131B2F;
    --border-soft: rgba(255,255,255,.08);
    --cyan:#2FE0FF;
    --cyan-deep:#1A4FD1;
    --text:#EAF2FA;
    --muted:#7C8AA3;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{ height:100%; }
  body{
    font-family:'Cairo', sans-serif;
    color:var(--text);
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(circle at 18% 12%, rgba(47,224,255,.10), transparent 38%),
      radial-gradient(circle at 88% 85%, rgba(26,79,209,.14), transparent 42%),
      var(--void);
    overflow:hidden;
  }

  .topbar{
    background:rgba(14,21,38,.9);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border-soft);
    padding:14px 20px;
    display:flex;
    align-items:center;
    gap:12px;
    flex-shrink:0;
  }
  .back-btn{
    width:34px; height:34px;
    border-radius:9px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--border-soft);
    color:var(--text);
    display:flex; align-items:center; justify-content:center;
    text-decoration:none;
    font-size:16px;
    flex-shrink:0;
  }
  .back-btn:hover{ border-color:var(--cyan); color:var(--cyan); }
  .avatar{
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    color:#06121C;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:15px;
    flex-shrink:0;
    overflow:hidden;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .peer-info{ flex:1; min-width:0; }
  .peer-name{ font-weight:700; font-size:15.5px; }
  .peer-status{ font-size:12px; color:var(--muted); }

  /* ===== Menu button + dropdown ===== */
  .menu-wrap{ position:relative; flex-shrink:0; }
  .menu-btn{
    width:34px; height:34px;
    border-radius:9px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--border-soft);
    color:var(--text);
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    cursor:pointer;
    font-family:inherit;
  }
  .menu-btn:hover{ border-color:var(--cyan); color:var(--cyan); }
  .menu-dropdown{
    position:absolute;
    top:42px; left:0;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:14px;
    min-width:190px;
    box-shadow:0 20px 50px -15px rgba(0,0,0,.6);
    display:none;
    overflow:hidden;
    z-index:20;
  }
  .menu-dropdown.show{ display:block; }
  .menu-item{
    width:100%;
    text-align:right;
    padding:13px 16px;
    background:none;
    border:none;
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .menu-item:hover{ background:var(--surface-2); }
  .menu-item.danger{ color:#FF5D75; }

  /* ===== Blocked banner ===== */
  .blocked-banner{
    display:none;
    align-items:center;
    gap:10px;
    background:rgba(255,93,117,.08);
    border-bottom:1px solid rgba(255,93,117,.25);
    color:#FF5D75;
    font-size:13px;
    padding:10px 16px;
    text-align:center;
    justify-content:center;
    flex-shrink:0;
  }
  .blocked-banner.show{ display:flex; }
  .blocked-banner button{
    background:none;
    border:1px solid rgba(255,93,117,.4);
    color:#FF5D75;
    font-family:inherit;
    font-size:12px;
    font-weight:700;
    padding:5px 12px;
    border-radius:8px;
    cursor:pointer;
  }
  .blocked-banner button:hover{ background:rgba(255,93,117,.12); }

  /* ===== Messages area ===== */
  .messages{
    flex:1;
    overflow-y:auto;
    padding:18px 16px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .messages::-webkit-scrollbar{ width:6px; }
  .messages::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.12); border-radius:10px; }

  .msg-row{
    display:flex;
    margin:3px 0;
    max-width:78%;
  }
  .msg-row.mine{ align-self:flex-end; flex-direction:row-reverse; }
  .msg-row.theirs{ align-self:flex-start; }

  .bubble{
    padding:10px 14px;
    border-radius:16px;
    font-size:14.5px;
    line-height:1.65;
    word-wrap:break-word;
    white-space:pre-wrap;
    position:relative;
  }
  .msg-row.mine .bubble{
    background:linear-gradient(135deg, var(--cyan-deep), #1640A8);
    color:#fff;
    border-bottom-left-radius:5px;
  }
  .msg-row.theirs .bubble{
    background:var(--surface);
    border:1px solid var(--border-soft);
    color:var(--text);
    border-bottom-right-radius:5px;
  }
  .msg-time{
    display:flex;
    align-items:center;
    gap:3px;
    font-size:10.5px;
    margin-top:4px;
    opacity:.75;
    justify-content:flex-end;
  }
  .msg-row.theirs .msg-time{ justify-content:flex-start; }
  .msg-ticks{
    display:inline-flex;
    align-items:center;
    line-height:1;
  }
  .msg-ticks svg{ display:block; }
  .msg-ticks.seen svg path{ fill:#5BD0FF; }

  .empty-chat{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:var(--muted);
    font-size:14px;
    padding:32px;
  }
  .empty-chat .icon{ font-size:34px; display:block; margin-bottom:10px; }

  /* ===== Composer ===== */
  .composer{
    flex-shrink:0;
    border-top:1px solid var(--border-soft);
    background:rgba(14,21,38,.92);
    backdrop-filter:blur(8px);
    padding:12px 14px;
    display:flex;
    align-items:flex-end;
    gap:10px;
  }
  .composer textarea{
    flex:1;
    resize:none;
    max-height:120px;
    min-height:44px;
    padding:11px 16px;
    border:1.5px solid var(--border-soft);
    border-radius:20px;
    font-family:inherit;
    font-size:14.5px;
    color:var(--text);
    background:var(--surface-2);
    outline:none;
    line-height:1.5;
    transition:border-color .15s, box-shadow .15s;
  }
  .composer textarea::placeholder{ color:#52607A; }
  .composer textarea:focus{
    border-color:var(--cyan);
    box-shadow:0 0 0 4px rgba(47,224,255,.18);
  }
  .send-btn{
    width:44px; height:44px;
    border-radius:50%;
    border:none;
    flex-shrink:0;
    background:linear-gradient(135deg,var(--cyan), var(--cyan-deep));
    color:#06121C;
    font-size:17px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:filter .15s, transform .1s, opacity .15s;
    box-shadow:0 8px 20px -8px rgba(47,224,255,.55);
  }
  .send-btn:hover{ filter:brightness(1.08); }
  .send-btn:active{ transform:scale(.94); }
  .send-btn:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }

  .composer.disabled textarea{ opacity:.5; cursor:not-allowed; }
  .composer.disabled .send-btn{ opacity:.3; cursor:not-allowed; }

  /* ===== Mic / recording ===== */
  .mic-btn{
    width:44px; height:44px;
    border-radius:50%;
    border:none;
    flex-shrink:0;
    background:rgba(255,255,255,.06);
    border:1px solid var(--border-soft);
    color:var(--text);
    font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:transform .1s, background .15s, border-color .15s;
  }
  .mic-btn:active{ transform:scale(.92); }
  .composer.disabled .mic-btn{ opacity:.3; cursor:not-allowed; }

  .recording-bar{
    display:none;
    flex:1;
    align-items:center;
    gap:10px;
    padding:11px 16px;
    border:1.5px solid rgba(255,93,117,.4);
    border-radius:20px;
    background:rgba(255,93,117,.07);
  }
  .recording-bar.show{ display:flex; }
  .recording-bar .rec-dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--danger);
    flex-shrink:0;
    animation:recBlink 1s infinite;
  }
  @keyframes recBlink{ 0%,100%{ opacity:1; } 50%{ opacity:.25; } }
  .recording-bar .rec-time{
    font-size:13.5px; font-weight:700; color:var(--danger);
    font-variant-numeric:tabular-nums;
    flex-shrink:0;
  }
  .recording-bar .rec-hint{ flex:1; font-size:12.5px; color:var(--muted); }
  .recording-bar .rec-cancel{
    background:none; border:none; color:var(--muted);
    font-size:13px; font-weight:700; cursor:pointer; padding:4px 6px;
    flex-shrink:0;
  }
  .recording-bar .rec-cancel:hover{ color:var(--danger); }

  /* ===== Voice message bubble ===== */
  .voice-msg{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:190px;
    padding:2px 0;
  }
  .voice-play-btn{
    width:34px; height:34px;
    border-radius:50%;
    border:none;
    flex-shrink:0;
    background:rgba(255,255,255,.16);
    color:inherit;
    font-size:14px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .msg-row.theirs .voice-play-btn{ background:rgba(47,224,255,.16); color:var(--cyan); }
  .voice-wave{
    flex:1;
    height:24px;
    display:flex;
    align-items:center;
    gap:2px;
    cursor:pointer;
  }
  .voice-wave .bar{
    flex:1;
    min-width:2px;
    border-radius:2px;
    background:rgba(255,255,255,.35);
    transition:background .1s;
  }
  .msg-row.theirs .voice-wave .bar{ background:rgba(234,242,250,.25); }
  .voice-wave .bar.played{ background:#fff; }
  .msg-row.theirs .voice-wave .bar.played{ background:var(--cyan); }
  .voice-duration{
    font-size:11px;
    opacity:.8;
    flex-shrink:0;
    font-variant-numeric:tabular-nums;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <a href="chat.html" class="back-btn">→</a>
    <div class="avatar" id="avatar">؟</div>
    <div class="peer-info">
      <div class="peer-name" id="peerName">...</div>
      <div class="peer-status" id="peerStatus">محادثة خاصة</div>
    </div>
    <button type="button" class="back-btn" id="callBtn" title="مكالمة صوتية">📞</button>
    <div class="menu-wrap">
      <button type="button" class="menu-btn" id="menuBtn">⋮</button>
      <div class="menu-dropdown" id="menuDropdown">
        <button type="button" class="menu-item danger" id="blockBtn">🚫 حظر المستخدم</button>
      </div>
    </div>
  </div>

  <div class="blocked-banner" id="blockedBanner"></div>

  <div class="messages" id="messages">
    <div class="empty-chat" id="emptyChat">
      <span><span class="icon">💬</span>جاري تحميل المحادثة...</span>
    </div>
  </div>

  <form class="composer" id="composerForm">
    <textarea id="msgInput" placeholder="اكتبي رسالتك..." rows="1"></textarea>
    <div class="recording-bar" id="recordingBar">
      <span class="rec-dot"></span>
      <span class="rec-time" id="recTime">00:00</span>
      <span class="rec-hint">جاري التسجيل...</span>
      <button type="button" class="rec-cancel" id="recCancelBtn">إلغاء</button>
    </div>
    <button type="button" class="mic-btn" id="micBtn" title="رسالة صوتية">🎤</button>
    <button type="submit" class="send-btn" id="sendBtn">➤</button>
  </form>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    collection, addDoc, query, orderBy, onSnapshot, serverTimestamp,
    doc, setDoc, getDoc, arrayUnion, arrayRemove
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const chatId = params.get('chatId');
  const peerUid = params.get('uid');
  const peerName = params.get('name') || 'المستخدم';

  document.getElementById('peerName').textContent = peerName;
  const avatarEl = document.getElementById('avatar');
  avatarEl.textContent = peerName.charAt(0).toUpperCase();

  // جلب صورة بروفايل الشخص التاني لو موجودة
  getDoc(doc(db, 'users', peerUid)).then(snap => {
    if(snap.exists() && snap.data().photoURL){
      avatarEl.innerHTML = `<img src="${snap.data().photoURL}" alt="${peerName}">`;
    }
  }).catch(() => {});

  const messagesEl = document.getElementById('messages');
  const emptyChat = document.getElementById('emptyChat');
  const composerForm = document.getElementById('composerForm');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const micBtn = document.getElementById('micBtn');
  const recordingBar = document.getElementById('recordingBar');
  const recTime = document.getElementById('recTime');
  const recCancelBtn = document.getElementById('recCancelBtn');
  const peerStatus = document.getElementById('peerStatus');
  const menuBtn = document.getElementById('menuBtn');
  const menuDropdown = document.getElementById('menuDropdown');
  const blockBtn = document.getElementById('blockBtn');
  const blockedBanner = document.getElementById('blockedBanner');
  const callBtn = document.getElementById('callBtn');

  let currentUser = null;
  let iBlockedThem = false;   // إنتِ حاظراه
  let theyBlockedMe = false;  // هو حاظرك

  // لو مفيش chatId أو uid في الرابط، رجّعيها لقائمة المستخدمين
  if(!chatId || !peerUid){
    window.location.href = 'chat.html';
  }

  // حماية الصفحة
  onAuthStateChanged(auth, (user) => {
    if(!user){
      window.location.href = 'index.html';
      return;
    }
    currentUser = user;
    listenToMessages();
    listenToBlockStatus();
    listenToReadStatus();
    listenToPeerPresence();
    setupPresence();
  });

  // ====================================================
  // قائمة (⋮) فتح/قفل + حظر/إلغاء حظر
  // ====================================================
  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    menuDropdown.classList.toggle('show');
  });
  document.addEventListener('click', () => menuDropdown.classList.remove('show'));

  blockBtn.addEventListener('click', async () => {
    menuDropdown.classList.remove('show');
    if(!currentUser) return;

    if(!iBlockedThem){
      const confirmed = confirm(`متأكدة إنك عايزة تحظري ${peerName}؟ مش هتقدروا تتبادلوا رسايل بعد كده.`);
      if(!confirmed) return;

      try{
        await setDoc(doc(db, 'users', currentUser.uid), {
          blockedUsers: arrayUnion(peerUid)
        }, { merge: true });
      } catch(error){
        alert('حصل خطأ أثناء الحظر: ' + error.message);
      }
    } else {
      try{
        await setDoc(doc(db, 'users', currentUser.uid), {
          blockedUsers: arrayRemove(peerUid)
        }, { merge: true });
      } catch(error){
        alert('حصل خطأ أثناء إلغاء الحظر: ' + error.message);
      }
    }
  });

  // ====================================================
  // متابعة حالة الحظر لحظيًا (في الاتجاهين)
  // ====================================================
  function listenToBlockStatus(){
    // هل إنتِ حاظراه؟
    onSnapshot(doc(db, 'users', currentUser.uid), (snap) => {
      const blocked = snap.exists() ? (snap.data().blockedUsers || []) : [];
      iBlockedThem = blocked.includes(peerUid);
      updateBlockUI();
    });

    // هل هو حاظرك؟
    onSnapshot(doc(db, 'users', peerUid), (snap) => {
      const blocked = snap.exists() ? (snap.data().blockedUsers || []) : [];
      theyBlockedMe = blocked.includes(currentUser.uid);
      updateBlockUI();
    });
  }

  function updateBlockUI(){
    const isBlocked = iBlockedThem || theyBlockedMe;

    blockBtn.textContent = iBlockedThem ? '✅ إلغاء حظر المستخدم' : '🚫 حظر المستخدم';

    if(iBlockedThem){
      blockedBanner.innerHTML = `لقد قمتِ بحظر ${escapeHtml(peerName)} <button type="button" id="unblockInline">إلغاء الحظر</button>`;
      blockedBanner.classList.add('show');
      document.getElementById('unblockInline')?.addEventListener('click', () => blockBtn.click());
      peerStatus.textContent = 'محظور';
    } else if(theyBlockedMe){
      blockedBanner.innerHTML = `لا يمكنك إرسال رسائل لهذا المستخدم`;
      blockedBanner.classList.add('show');
      peerStatus.textContent = 'محادثة خاصة';
    } else {
      blockedBanner.classList.remove('show');
      renderPeerStatus();
    }

    composerForm.classList.toggle('disabled', isBlocked);
    msgInput.disabled = isBlocked;
    sendBtn.disabled = isBlocked;
    msgInput.placeholder = isBlocked ? 'مش متاح إرسال رسائل' : 'اكتبي رسالتك...';
    micBtn.disabled = isBlocked;
    callBtn.disabled = isBlocked;
    callBtn.style.opacity = isBlocked ? '.4' : '1';
    callBtn.style.cursor = isBlocked ? 'not-allowed' : 'pointer';
  }

  // ====================================================
  // بدء مكالمة صوتية
  // ====================================================
  callBtn.addEventListener('click', () => {
    if(iBlockedThem || theyBlockedMe) return;
    const callParams = new URLSearchParams({ chatId, uid: peerUid, name: peerName, role: 'caller' });
    window.location.href = `call.html?${callParams.toString()}`;
  });

  // ====================================================
  // الاستماع للرسائل لحظيًا (real-time) مرتبة حسب الوقت
  // ====================================================
  function listenToMessages(){
    const messagesRef = collection(db, 'chats', chatId, 'messages');
    const q = query(messagesRef, orderBy('createdAt', 'asc'));

    onSnapshot(q, (snapshot) => {
      if(snapshot.empty){
        messagesEl.innerHTML = '';
        messagesEl.appendChild(emptyChat);
        emptyChat.innerHTML = `<span><span class="icon">👋</span>ابدئي أول رسالة مع ${escapeHtml(peerName)}</span>`;
        return;
      }
      renderMessages(snapshot.docs.map(d => d.data()));
    }, (error) => {
      messagesEl.innerHTML = `<div class="empty-chat"><span>حصل خطأ في تحميل الرسائل: ${escapeHtml(error.message)}</span></div>`;
    });
  }

  function renderMessages(msgs){
    const wasNearBottom = isNearBottom();

    messagesEl.innerHTML = msgs.map(m => {
      const mine = m.senderId === currentUser.uid;
      const time = formatTime(m.createdAt);
      const ticks = mine ? renderTicks(m) : '';
      const body = m.type === 'voice'
        ? renderVoiceBubble(m)
        : escapeHtml(m.text);
      return `
        <div class="msg-row ${mine ? 'mine' : 'theirs'}">
          <div class="bubble">
            ${body}
            <span class="msg-time">${time}${ticks}</span>
          </div>
        </div>
      `;
    }).join('');

    if(wasNearBottom) scrollToBottom();
    attachVoicePlayers();

    // أحدث رسالة من الطرف التاني وصلتلك ودخلتي الشات: سجّلي إنك قريتيها
    markAsRead(msgs);
  }

  // ====================================================
  // فقاعة الرسالة الصوتية (واجهة فقط، التشغيل الفعلي في attachVoicePlayers)
  // ====================================================
  const VOICE_BARS = 24;
  function renderVoiceBubble(m){
    const duration = m.duration || 0;
    const bars = Array.from({length: VOICE_BARS}, (_, i) => {
      // ارتفاع شبه عشوائي بس ثابت لكل رسالة (مش بيتغير كل render) عشان شكل الموجة يفضل زي ما هو
      const h = 6 + Math.round(Math.abs(Math.sin((i + 1) * (m.createdAt?.seconds || 1))) * 16);
      return `<span class="bar" style="height:${h}px"></span>`;
    }).join('');
    return `
      <div class="voice-msg" data-audio="${m.audio}" data-duration="${duration}">
        <button type="button" class="voice-play-btn">▶</button>
        <div class="voice-wave">${bars}</div>
        <span class="voice-duration">${formatDuration(duration)}</span>
      </div>
    `;
  }

  function attachVoicePlayers(){
    document.querySelectorAll('.voice-msg').forEach(el => {
      if(el.dataset.bound) return;
      el.dataset.bound = '1';

      const playBtn = el.querySelector('.voice-play-btn');
      const wave = el.querySelector('.voice-wave');
      const bars = Array.from(wave.querySelectorAll('.bar'));
      const durationEl = el.querySelector('.voice-duration');
      const totalDuration = parseFloat(el.dataset.duration) || 0;

      let audio = null;
      let playing = false;

      function setPlayedBars(ratio){
        const filled = Math.round(ratio * bars.length);
        bars.forEach((b, i) => b.classList.toggle('played', i < filled));
      }

      playBtn.addEventListener('click', () => {
        // أوقفي أي صوت تاني شغال قبل ما تشغلي ده
        document.querySelectorAll('.voice-msg').forEach(other => {
          if(other !== el && other._audioEl){
            other._audioEl.pause();
          }
        });

        if(!audio){
          audio = new Audio(el.dataset.audio);
          el._audioEl = audio;
          audio.addEventListener('timeupdate', () => {
            if(audio.duration) setPlayedBars(audio.currentTime / audio.duration);
            durationEl.textContent = formatDuration(Math.max(0, (totalDuration - audio.currentTime)));
          });
          audio.addEventListener('ended', () => {
            playing = false;
            playBtn.textContent = '▶';
            setPlayedBars(0);
            durationEl.textContent = formatDuration(totalDuration);
          });
        }

        if(playing){
          audio.pause();
          playing = false;
          playBtn.textContent = '▶';
        } else {
          audio.play().catch(() => alert('تعذر تشغيل الرسالة الصوتية'));
          playing = true;
          playBtn.textContent = '⏸';
        }
      });
    });
  }

  function formatDuration(seconds){
    const s = Math.max(0, Math.round(seconds));
    const m = Math.floor(s / 60);
    const r = s % 60;
    return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;
  }

  // ====================================================
  // علامات الإرسال/الاستلام/القراءة (زي الواتساب)
  // ====================================================
  // ✓ واحدة رمادية  = اتبعتت (وصلت السيرفر)
  // ✓✓ رماديتين     = وصلت لجهاز التاني (مستلمة)
  // ✓✓ زرقاوين       = الطرف التاني فتح الشات وقراها
  const TICK_SINGLE = `<span class="msg-ticks"><svg width="14" height="10" viewBox="0 0 16 11" fill="none"><path d="M1 5.5L5 9.5L15 1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
  const TICK_DOUBLE = (seen) => `<span class="msg-ticks${seen ? ' seen' : ''}"><svg width="18" height="10" viewBox="0 0 20 11" fill="none"><path d="M1 5.5L5 9.5L15 1" stroke="${seen ? '#5BD0FF' : 'currentColor'}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 5.5L10 9.5L20 1" stroke="${seen ? '#5BD0FF' : 'currentColor'}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;

  function renderTicks(m){
    if(!m.createdAt) return TICK_SINGLE; // لسه بترفع (وقت السيرفر لسه ماوصلش)
    const seen = !!(m.createdAt && peerLastRead && m.createdAt.toMillis() <= peerLastRead);
    return TICK_DOUBLE(seen);
  }

  let peerLastRead = 0; // آخر وقت قرا فيه الطرف التاني رسايلك (millis)
  let lastMarkedReadAt = 0;

  function markAsRead(msgs){
    if(!currentUser || !msgs.length) return;
    const lastMsg = msgs[msgs.length - 1];
    if(!lastMsg.createdAt) return;
    const lastMillis = lastMsg.createdAt.toMillis();
    if(lastMillis <= lastMarkedReadAt) return;
    lastMarkedReadAt = lastMillis;

    setDoc(doc(db, 'chats', chatId), {
      lastRead: { [currentUser.uid]: serverTimestamp() }
    }, { merge: true }).catch(() => {});
  }

  // متابعة وقت آخر قراءة للطرف التاني، عشان نلوّن التيكات
  function listenToReadStatus(){
    onSnapshot(doc(db, 'chats', chatId), (snap) => {
      const data = snap.data();
      const ts = data?.lastRead?.[peerUid];
      peerLastRead = ts && ts.toMillis ? ts.toMillis() : 0;
    });
  }

  function isNearBottom(){
    return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 150;
  }
  function scrollToBottom(){
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function formatTime(ts){
    if(!ts || !ts.toDate) return '';
    const d = ts.toDate();
    return d.toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  // ====================================================
  // إرسال رسالة جديدة
  // ====================================================
  async function sendMessage(){
    const text = msgInput.value.trim();
    if(!text || !currentUser) return;

    if(iBlockedThem || theyBlockedMe){
      alert('مش ممكن تبعتي رسائل في المحادثة دي');
      return;
    }

    msgInput.value = '';
    autoGrow();
    sendBtn.disabled = true;

    try{
      // تأكيد وجود مستند الشات نفسه (يفيد لاحقًا في عرض قوائم المحادثات وآخر رسالة)
      await setDoc(doc(db, 'chats', chatId), {
        members: [currentUser.uid, peerUid],
        updatedAt: serverTimestamp(),
        lastMessage: text
      }, { merge: true });

      await addDoc(collection(db, 'chats', chatId, 'messages'), {
        text: text,
        senderId: currentUser.uid,
        createdAt: serverTimestamp()
      });
    } catch(error){
      alert('حصل خطأ أثناء إرسال الرسالة: ' + error.message);
    } finally {
      sendBtn.disabled = iBlockedThem || theyBlockedMe;
      msgInput.focus();
    }
  }

  composerForm.addEventListener('submit', (e) => {
    e.preventDefault();
    sendMessage();
  });

  // إرسال بـ Enter، وسطر جديد بـ Shift+Enter
  msgInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });

  // ====================================================
  // حالة الاتصال (اونلاين / آخر ظهور) — زي الواتساب
  // ====================================================
  let peerOnline = false;
  let peerLastActiveMillis = 0;

  function renderPeerStatus(){
    if(iBlockedThem || theyBlockedMe) return; // updateBlockUI بتتكفل بالنص وقتها
    if(peerOnline){
      peerStatus.textContent = 'متصلة الآن';
    } else if(peerLastActiveMillis){
      peerStatus.textContent = 'آخر ظهور ' + formatLastSeen(peerLastActiveMillis);
    } else {
      peerStatus.textContent = 'محادثة خاصة';
    }
  }

  function formatLastSeen(millis){
    const d = new Date(millis);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const time = d.toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
    if(sameDay) return 'اليوم ' + time;
    const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
    if(d.toDateString() === yesterday.toDateString()) return 'أمس ' + time;
    return d.toLocaleDateString('ar-EG', { day:'numeric', month:'short' }) + ' ' + time;
  }

  // اعتبري المستخدم "اونلاين" لو آخر نبضة منه خلال آخر 25 ثانية
  const ONLINE_THRESHOLD_MS = 25000;
  function listenToPeerPresence(){
    onSnapshot(doc(db, 'users', peerUid), (snap) => {
      const ts = snap.data()?.lastActive;
      peerLastActiveMillis = ts && ts.toMillis ? ts.toMillis() : 0;
      peerOnline = peerLastActiveMillis ? (Date.now() - peerLastActiveMillis < ONLINE_THRESHOLD_MS) : false;
      renderPeerStatus();
    });
  }
  // إعادة تقييم اونلاين/أوفلاين كل شوية حتى لو معندناش تحديث جديد من فايرستور
  setInterval(() => {
    if(!peerLastActiveMillis) return;
    const nowOnline = Date.now() - peerLastActiveMillis < ONLINE_THRESHOLD_MS;
    if(nowOnline !== peerOnline){
      peerOnline = nowOnline;
      renderPeerStatus();
    }
  }, 5000);

  // نبضة حضور بتاعتك إنتِ، تتبعت كل ما الصفحة مفتوحة وفعّالة
  function setupPresence(){
    const ping = () => {
      if(!currentUser || document.hidden) return;
      setDoc(doc(db, 'users', currentUser.uid), { lastActive: serverTimestamp() }, { merge: true }).catch(() => {});
    };
    ping();
    setInterval(ping, 15000);
    document.addEventListener('visibilitychange', () => { if(!document.hidden) ping(); });
  }


  function autoGrow(){
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  }
  msgInput.addEventListener('input', autoGrow);

  // ====================================================
  // تسجيل وإرسال رسالة صوتية (زي الواتساب)
  // ====================================================
  const MAX_RECORD_SECONDS = 90; // حد أقصى لمدة التسجيل عشان نضمن حجم معقول للتخزين في Firestore

  let mediaRecorder = null;
  let recordedChunks = [];
  let recordStream = null;
  let recordStartTime = 0;
  let recordTimerInterval = null;
  let recordCancelled = false;

  micBtn.addEventListener('click', async () => {
    if(iBlockedThem || theyBlockedMe) return;
    if(mediaRecorder && mediaRecorder.state === 'recording'){
      stopRecording(false);
      return;
    }
    await startRecording();
  });

  recCancelBtn.addEventListener('click', () => stopRecording(true));

  async function startRecording(){
    try{
      recordStream = await navigator.mediaDevices.getUserMedia({ audio:true });
    } catch(e){
      alert('محتاجة صلاحية الميكروفون عشان تسجلي رسالة صوتية');
      return;
    }

    recordedChunks = [];
    recordCancelled = false;

    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : (MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '');

    mediaRecorder = mimeType ? new MediaRecorder(recordStream, { mimeType }) : new MediaRecorder(recordStream);

    mediaRecorder.ondataavailable = (e) => {
      if(e.data && e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.onstop = handleRecordingStop;

    mediaRecorder.start();
    recordStartTime = Date.now();

    msgInput.style.display = 'none';
    recordingBar.classList.add('show');
    micBtn.textContent = '⏹';
    recTime.textContent = '00:00';

    recordTimerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2,'0');
      const s = String(elapsed % 60).padStart(2,'0');
      recTime.textContent = `${m}:${s}`;
      if(elapsed >= MAX_RECORD_SECONDS) stopRecording(false);
    }, 250);
  }

  function stopRecording(cancelled){
    recordCancelled = cancelled;
    if(mediaRecorder && mediaRecorder.state === 'recording'){
      mediaRecorder.stop();
    }
    clearInterval(recordTimerInterval);
    if(recordStream){
      recordStream.getTracks().forEach(t => t.stop());
      recordStream = null;
    }
    msgInput.style.display = '';
    recordingBar.classList.remove('show');
    micBtn.textContent = '🎤';
  }

  async function handleRecordingStop(){
    if(recordCancelled || recordedChunks.length === 0) return;

    const durationSeconds = (Date.now() - recordStartTime) / 1000;
    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'audio/webm' });

    if(blob.size > 850000){
      alert('الرسالة الصوتية طويلة جدًا، جربي تسجيل أقصر');
      return;
    }

    try{
      const dataUrl = await blobToDataUrl(blob);
      await sendVoiceMessage(dataUrl, durationSeconds);
    } catch(error){
      alert('حصل خطأ أثناء إرسال الرسالة الصوتية: ' + error.message);
    }
  }

  function blobToDataUrl(blob){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('فشل تجهيز التسجيل'));
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    });
  }

  async function sendVoiceMessage(dataUrl, durationSeconds){
    if(iBlockedThem || theyBlockedMe){
      alert('مش ممكن تبعتي رسائل في المحادثة دي');
      return;
    }
    try{
      await setDoc(doc(db, 'chats', chatId), {
        members: [currentUser.uid, peerUid],
        updatedAt: serverTimestamp(),
        lastMessage: '🎤 رسالة صوتية'
      }, { merge: true });

      await addDoc(collection(db, 'chats', chatId, 'messages'), {
        type: 'voice',
        audio: dataUrl,
        duration: durationSeconds,
        senderId: currentUser.uid,
        createdAt: serverTimestamp()
      });
    } catch(error){
      alert('حصل خطأ أثناء إرسال الرسالة الصوتية: ' + error.message);
    }
  }
</script>
